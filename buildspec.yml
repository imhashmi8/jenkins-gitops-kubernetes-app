version: 0.2

env:
  shell: bash

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Installing application dependencies"
      - npm ci

  pre_build:
    commands:
      - echo "Running pre-build checks"
      - test -n "$AWS_DEFAULT_REGION"
      - test -n "$AWS_ACCOUNT_ID"
      - test -n "$IMAGE_REPO_NAME"
      - test -n "$IMAGE_REPO_URI"
      - COMMIT_SHA="${CODEBUILD_RESOLVED_SOURCE_VERSION:-manual}"
      - SHORT_SHA="$(echo "$COMMIT_SHA" | cut -c 1-7)"
      - IMAGE_TAG="${CODEBUILD_BUILD_NUMBER:-0}-${SHORT_SHA}"
      - echo "Logging in to Amazon ECR"
      - aws ecr get-login-password --region "$AWS_DEFAULT_REGION" | docker login --username AWS --password-stdin "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com"

  build:
    commands:
      - echo "Building Docker image"
      - docker build -t "$IMAGE_REPO_URI:$IMAGE_TAG" -t "$IMAGE_REPO_URI:latest" .

  post_build:
    commands:
      - echo "Pushing Docker images to ECR"
      - docker push "$IMAGE_REPO_URI:$IMAGE_TAG"
      - docker push "$IMAGE_REPO_URI:latest"
      - printf '[{"name":"todo-app","imageUri":"%s"}]' "$IMAGE_REPO_URI:$IMAGE_TAG" > imagedefinitions.json
      - printf '{"image":"%s","tag":"%s","commit":"%s"}\n' "$IMAGE_REPO_URI" "$IMAGE_TAG" "$COMMIT_SHA" > imageDetail.json

artifacts:
  files:
    - imagedefinitions.json
    - imageDetail.json
